name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          name="ai-guard-${{ matrix.target }}"
          tar -C target/${{ matrix.target }}/release -czf "${name}.tar.gz" ai-guard
          shasum -a 256 "${name}.tar.gz" | awk '{print $1}' > "${name}.tar.gz.sha256"

      - name: Package archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "ai-guard-${{ matrix.target }}"
          Compress-Archive -Path "target/${{ matrix.target }}/release/ai-guard.exe" -DestinationPath "$name.zip"
          $hash = (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "$name.zip.sha256" -Value $hash -NoNewline

      - uses: actions/upload-artifact@v4
        with:
          name: ai-guard-${{ matrix.target }}
          path: |
            ai-guard-${{ matrix.target }}.tar.gz
            ai-guard-${{ matrix.target }}.tar.gz.sha256
            ai-guard-${{ matrix.target }}.zip
            ai-guard-${{ matrix.target }}.zip.sha256
          if-no-files-found: ignore

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/**/*
